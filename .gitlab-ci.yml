stages:
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NODE_ENV: test

cache:
  paths:
    - .cache/pip
    - app/node_modules/

api-test:
  stage: test
  image: python:3.10-slim
  before_script:
    - cd api
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - python manage.py test

app-build:
  stage: build
  image: node:20-alpine
  before_script:
    - cd app
    - npm ci
  script:
    - npm run build
