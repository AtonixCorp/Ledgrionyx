---
all:
  vars:
    env: stage
    atc_registry_url: "{{ lookup('env', 'REGISTRY_URL') }}"

  children:
    bastion:
      hosts:
        atc-stage-bastion-01:
          ansible_host: REPLACE_WITH_FLOATING_IP
          ansible_user: ubuntu

    api:
      hosts:
        atc-stage-ledger-01:
          ansible_host: 10.30.1.10
          atc_service: ledger
        atc-stage-ledger-02:
          ansible_host: 10.30.1.11
          atc_service: ledger
        atc-stage-accounts-01:
          ansible_host: 10.30.1.12
          atc_service: accounts
        atc-stage-accounts-02:
          ansible_host: 10.30.1.13
          atc_service: accounts
        atc-stage-risk-01:
          ansible_host: 10.30.1.14
          atc_service: risk
        atc-stage-reporting-01:
          ansible_host: 10.30.1.15
          atc_service: reporting

    database:
      hosts:
        atc-stage-db-01:
          ansible_host: 10.30.1.20
          atc_service: db

  vars:
    ansible_ssh_common_args: >-
      -o ProxyJump=ubuntu@{{ hostvars['atc-stage-bastion-01']['ansible_host'] }}
      -o StrictHostKeyChecking=no
