---
# DEV environment inventory
# Bastion IPs and internal hosts are populated from Terraform outputs
# or via the OpenStack dynamic inventory plugin.
#
# For dynamic inventory, configure openstack_inventory.yml and use:
#   ansible-playbook -i inventories/dev/openstack_inventory.yml ...

all:
  vars:
    env: dev
    atc_registry_url: "{{ lookup('env', 'REGISTRY_URL') }}"

  children:
    bastion:
      hosts:
        atc-dev-bastion-01:
          ansible_host: REPLACE_WITH_FLOATING_IP
          ansible_user: ubuntu

    api:
      hosts:
        atc-dev-ledger-01:
          ansible_host: 10.10.1.10
          atc_service: ledger
        atc-dev-accounts-01:
          ansible_host: 10.10.1.11
          atc_service: accounts

    database:
      hosts:
        atc-dev-db-01:
          ansible_host: 10.10.1.20
          atc_service: db

  vars:
    ansible_ssh_common_args: >-
      -o ProxyJump=ubuntu@{{ hostvars['atc-dev-bastion-01']['ansible_host'] }}
      -o StrictHostKeyChecking=no
