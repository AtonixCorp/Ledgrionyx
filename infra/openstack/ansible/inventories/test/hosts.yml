---
all:
  vars:
    env: test
    atc_registry_url: "{{ lookup('env', 'REGISTRY_URL') }}"

  children:
    bastion:
      hosts:
        lgx-test-bastion-01:
          ansible_host: REPLACE_WITH_FLOATING_IP
          ansible_user: ubuntu

    api:
      hosts:
        lgx-test-ledger-01:
          ansible_host: 10.20.1.10
          atc_service: ledger
        lgx-test-accounts-01:
          ansible_host: 10.20.1.11
          atc_service: accounts

    database:
      hosts:
        lgx-test-db-01:
          ansible_host: 10.20.1.20
          atc_service: db

  vars:
    ansible_ssh_common_args: >-
      -o ProxyJump=ubuntu@{{ hostvars['lgx-test-bastion-01']['ansible_host'] }}
      -o StrictHostKeyChecking=no
