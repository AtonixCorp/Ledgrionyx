

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atonix-backend
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=finance_api.settings
      - PYTHONUNBUFFERED=1
    depends_on: []

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atonix-frontend
    command: npm start
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  db:
    image: dhi.io/postgres:14-alpine3.22
    container_name: atonix-db
    environment:
      - POSTGRES_DB=atonix
      - POSTGRES_USER=atonix
      - POSTGRES_PASSWORD=atonixpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
