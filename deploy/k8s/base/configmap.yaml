apiVersion: v1
kind: ConfigMap
metadata:
  name: ledgrionyx-config
data:
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: "api.ledgrionyx.local,localhost"
  CORS_ALLOWED_ORIGINS: "https://app.ledgrionyx.local"
  CSRF_TRUSTED_ORIGINS: "https://app.ledgrionyx.local"
  DJANGO_SECURE_SSL_REDIRECT: "true"
  DJANGO_SESSION_COOKIE_SECURE: "true"
  DJANGO_CSRF_COOKIE_SECURE: "true"
  DEPLOYMENT_ENVIRONMENT: "base"
  APP_VERSION: "latest"