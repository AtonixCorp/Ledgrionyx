name: LedgrionyxMobile
options:
  bundleIdPrefix: com.ledgrionyx
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 15.1
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  LedgrionyxMobile:
    type: application
    platform: iOS
    deploymentTarget: "15.1"
    sources:
      - path: LedgrionyxMobile
        excludes:
          - Info.plist
          - LaunchScreen.storyboard
          - PrivacyInfo.xcprivacy
      - path: LedgrionyxMobile/LaunchScreen.storyboard
      - path: LedgrionyxMobile/PrivacyInfo.xcprivacy
      - path: LedgrionyxMobile/Images.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ledgrionyx.mobile
        PRODUCT_NAME: LedgrionyxMobile
        INFOPLIST_FILE: LedgrionyxMobile/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Ledgrionyx
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - '@executable_path/Frameworks'
        OTHER_LDFLAGS:
          - $(inherited)
          - -ObjC
        TARGETED_DEVICE_FAMILY: 1